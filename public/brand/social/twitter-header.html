<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1500px; height: 500px; background: linear-gradient(135deg, #0369a1 0%, #0891b2 50%, #14b8a6 100%); display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans', sans-serif; position: relative; overflow: hidden; }
    .waves { position: absolute; width: 100%; bottom: 50px; opacity: 0.15; }
    .waves path { stroke: white; fill: none; stroke-linecap: round; }
    .content { text-align: center; position: relative; z-index: 1; }
    .title { font-size: 52px; font-weight: 700; color: white; letter-spacing: 0.05em; }
    .subtitle { font-size: 15px; font-weight: 500; letter-spacing: 0.3em; color: rgba(255,255,255,0.7); margin-top: 4px; }
    .tagline { font-size: 22px; color: rgba(255,255,255,0.9); margin-top: 28px; font-weight: 400; }
  </style>
</head>
<body>
  <svg class="waves" viewBox="0 0 1500 80" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 40c56-30 112-30 168 0s112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0" stroke-width="4"/>
    <path d="M0 60c56-30 112-30 168 0s112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0 112 30 168 0 112-30 168 0" stroke-width="3" opacity="0.5"/>
  </svg>
  <div class="content">
    <div class="title">SYNC WAVE</div>
    <div class="subtitle">ANALYTICS</div>
    <div class="tagline">AI-powered data analytics, engineering, and full stack development</div>
  </div>
</body>
</html>
