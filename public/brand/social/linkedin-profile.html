<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 400px; height: 400px; background: #f0f9ff; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans', sans-serif; }
    .container { text-align: center; }
    .icon { margin: 0 auto 12px; }
    .title { font-size: 28px; font-weight: 700; letter-spacing: 0.05em; background: linear-gradient(to right, #0369a1, #0891b2, #14b8a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 11px; font-weight: 500; letter-spacing: 0.3em; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" width="80" height="80" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0369a1"/><stop offset="50%" stop-color="#0891b2"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient></defs>
      <rect width="128" height="128" rx="24" fill="#f0f9ff"/>
      <path d="M16 72c12-16 24-16 32 0s20 16 32 0 20-16 32 0" stroke="url(#wg)" stroke-width="12" stroke-linecap="round" fill="none"/>
      <path d="M16 96c12-16 24-16 32 0s20 16 32 0 20-16 32 0" stroke="url(#wg)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.5"/>
    </svg>
    <div class="title">SYNC WAVE</div>
    <div class="subtitle">ANALYTICS</div>
  </div>
</body>
</html>
