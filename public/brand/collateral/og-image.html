<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; background: linear-gradient(135deg, #0369a1 0%, #0891b2 50%, #14b8a6 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Noto Sans', sans-serif; position: relative; overflow: hidden; }
    .waves { position: absolute; bottom: 40px; width: 100%; opacity: 0.12; }
    .waves path { stroke: white; fill: none; stroke-linecap: round; }
    .content { text-align: center; position: relative; z-index: 1; }
    .title { font-size: 56px; font-weight: 700; color: white; letter-spacing: 0.05em; }
    .subtitle { font-size: 16px; font-weight: 500; letter-spacing: 0.3em; color: rgba(255,255,255,0.7); margin-top: 4px; }
    .tagline { font-size: 22px; color: rgba(255,255,255,0.9); margin-top: 28px; max-width: 700px; line-height: 1.4; }
  </style>
</head>
<body>
  <svg class="waves" viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 40c45-30 90-30 135 0s90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0" stroke-width="4"/>
    <path d="M0 60c45-30 90-30 135 0s90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0 90 30 135 0 90-30 135 0" stroke-width="3" opacity="0.5"/>
  </svg>
  <div class="content">
    <svg width="72" height="72" viewBox="0 0 128 128" style="margin-bottom: 16px;"><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,0.8)"/><stop offset="100%" stop-color="rgba(255,255,255,0.4)"/></linearGradient></defs><path d="M16 72c12-16 24-16 32 0s20 16 32 0 20-16 32 0" stroke="url(#wg)" stroke-width="12" stroke-linecap="round" fill="none"/><path d="M16 96c12-16 24-16 32 0s20 16 32 0 20-16 32 0" stroke="url(#wg)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.5"/></svg>
    <div class="title">SYNC WAVE</div>
    <div class="subtitle">ANALYTICS</div>
    <div class="tagline">AI-powered data analytics, engineering, and full stack development</div>
  </div>
</body>
</html>
